<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>恋爱剧情游戏：多线升级版</title>
<style>
body{
    font-family: Arial;
    background:#0e0f1a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
#game{
    width:640px;
    background:#1c1f33;
    padding:22px;
    border-radius:14px;
    box-shadow:0 0 30px rgba(255,255,255,0.08);
}
button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#34385a;
    color:#fff;
}
button:hover{background:#50558a;}
#text{min-height:140px;line-height:1.6;}
</style>
</head>
<body>
<div id="game">
<div id="text"></div>
<div id="buttons"></div>
</div>

<script>
let state=0;
let aff=0;
let flags={};
let route="normal";

const s=[
{t:"雨夜咖啡店，你推门而入。三个人同时看向你：冷淡的林然、温柔的许言、神秘的陌生女孩。",o:[["走向林然",1],["走向许言",20],["注意陌生女孩",40]]},

// 林然线（理性冷淡）
{t:"林然没有抬头：'你坐错位置了。'",o:[["坐下不走",2],["换位置",3]]},
{t:"她终于看你一眼，像在评估一个变量。",o:[["搭话",4],["沉默观察",5]]},
{t:"她说不喜欢无意义社交。",o:[["挑战她观点",6],["顺着她",7]]},
{t:"她第一次停顿。",o:[["继续逼近情绪",8],["收敛",9]]},
{t:"她让你留下联系方式。",o:[["接受",10],["拒绝试探",11]]},
{t:"她开始偶尔主动发消息。",o:[["回应加速",12],["控制节奏",13]]},
{t:"关系进入微妙阶段。",o:[["确认关系",14],["保持暧昧",15]]},
{t:"林然线结局判断中...",o:[]},

// 林然延伸
{t:"她问你为什么坚持。",o:[["因为你",16],["因为习惯",17]]},
{t:"她沉默很久。",o:[["抱她",18],["不动",19]]},
{t:"结局A：理性共存关系",o:[]},
{t:"隐藏分支开启...",o:[["进入隐藏线",99]]},

// 许言线（温柔治愈）
{t:"许言微笑：'你看起来有点累。'",o:[["承认",21],["否认",22]]},
{t:"她递给你一杯热饮。",o:[["接受",23],["拒绝",24]]},
{t:"她说可以慢慢聊。",o:[["倾诉",25],["试探她",26]]},
{t:"她安静听你说话。",o:[["继续说",27],["停下观察她",28]]},
{t:"她说你很特别。",o:[["回应",29],["沉默",30]]},
{t:"她开始依赖你联系。",o:[["推进关系",31],["保持距离",32]]},
{t:"她邀请你散步。",o:[["接受",33],["拒绝",34]]},
{t:"夜晚很安静。",o:[["牵手",35],["不牵手",36]]},
{t:"关系进入稳定期。",o:[["表白",37],["继续观察",38]]},
{t:"结局B：温柔稳定关系",o:[]},
{t:"隐藏变量提升",o:[["触发隐藏线",99]]},

// 陌生女孩线（神秘）
{t:"她一直在看你，但没有说话。",o:[["主动接近",41],["假装没看见",42]]},
{t:"她突然问：'你相信命运吗？'",o:[["相信",43],["不信",44]]},
{t:"她笑了，像知道答案一样。",o:[["追问",45],["沉默",46]]},
{t:"她留下一个地址。",o:[["去看看",47],["不去",48]]},
{t:"那里没有人，只有一张写着你名字的纸。",o:[["继续探索",49],["离开",50]]},
{t:"你发现她似乎认识你很久。",o:[["质问",51],["接受",52]]},
{t:"现实开始模糊。",o:[["进入隐藏世界",99],["退出",53]]},
{t:"结局C：未知关系线",o:[]},

// 隐藏线
{t:"你进入一个不属于现实的空间，三个人都在。",o:[["选择林然",54],["选择许言",55],["选择她",56]]},
{t:"他们都记得你。",o:[["继续",57]]},
{t:"你意识到所有选择曾同时发生。",o:[["接受现实",58],["否认",59]]},
{t:"隐藏真结局：你才是被观察者",o:[]}
];

function r(){
let sc=s[state];
document.getElementById("text").innerText=sc.t;
let b=document.getElementById("buttons");
b.innerHTML="";
if(sc.o.length==0){
let x=document.createElement("button");
x.innerText="重新开始";
x.onclick=()=>{state=0;aff=0;flags={};r();};
b.appendChild(x);
return;
}
sc.o.forEach(i=>{
let btn=document.createElement("button");
btn.innerText=i[0];
btn.onclick=()=>{
state=i[1];
aff++;
if(state==99){route="hidden";}
r();
};
b.appendChild(btn);
});
}
r();
</script>
</body>
</html>
