<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Lunareth Story</title>

<style>
body{
background:#0f0f18;
color:#eee;
font-family:serif;
display:flex;
justify-content:center;
margin-top:40px;
}

#game{
width:700px;
}

#text{
font-size:18px;
line-height:1.8;
margin-bottom:30px;
}

button{
display:block;
margin:10px 0;
padding:12px;
font-size:16px;
background:#1e1e30;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#3a3a60;
}
</style>
</head>

<body>

<div id="game">
<h2>Lunareth</h2>
<div id="text"></div>
<div id="choices"></div>
</div>

<script>

let courage=0
let alden=0
let lys=0
let noah=0

const text=document.getElementById("text")
const choices=document.getElementById("choices")

function scene(t,opts){

text.innerHTML=t
choices.innerHTML=""

opts.forEach(o=>{

let b=document.createElement("button")
b.innerText=o.text

b.onclick=function(){

if(o.effect){

courage+=o.effect.courage||0
alden+=o.effect.alden||0
lys+=o.effect.lys||0
noah+=o.effect.noah||0

}

o.next()
}

choices.appendChild(b)

})

}

function start(){

scene(
`夜晚的浮空城 Lunareth。

灯火像漂浮的星河。

你站在街道尽头。

远处桥上有一个身影。`,
[
{ text:"走过去", effect:{courage:1}, next:bridge },
{ text:"继续前行", next:market }
])

}

function bridge(){

scene(
`骑士转身。

“Alden。”`,
[
{ text:"回应他", effect:{alden:1}, next:route },
{ text:"观察他", effect:{alden:2}, next:route }
])

}

function market(){

scene(
`银发旅者坐在屋顶。

“你在看什么？”`,
[
{ text:"问他", effect:{lys:2}, next:route },
{ text:"坐下", effect:{lys:1}, next:route }
])

}

function route(){

scene(
`你开始认识他们。

命运被改变。`,
[
{ text:"继续", next:end }
])

}

function end(){

let result=""

if(alden>lys && alden>noah){
result="王城结局：Alden与你并肩守护城市。"
}else if(lys>alden && lys>noah){
result="远航结局：你与Lys离开浮空城。"
}else if(noah>0){
result="学者结局：你留在图书塔。"
}else{
result="普通结局：你继续独自生活。"
}

scene(result,[{text:"重新开始",next:start}])

}

start()

</script>

</body>
</html>
